# Provero - Quickstart Example
# Run with: provero run -c examples/quickstart/provero.yaml

source:
  type: duckdb
  table: read_csv('examples/quickstart/orders.csv')

checks:
  - not_null: [order_id, customer_id, amount]
  - unique: order_id
  - accepted_values:
      column: status
      values: [pending, shipped, delivered, cancelled]
  - range:
      column: amount
      min: 0
      max: 100000
  - row_count:
      min: 1
